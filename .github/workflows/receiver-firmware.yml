name: Receiver Firmware (UF2)

# Builds a flashable .uf2 for the HolyIOT YJ-17120 nRF52840 USB receiver using
# our FEM-removed board definition (firmware/boards/holyiot/holyiot_yj17120),
# dropped into a checkout of SlimeVR's receiver firmware and built with the
# nRF Connect SDK via west. PRs and manual runs upload the UF2 as an artifact;
# pushes to main also publish a rolling "receiver-firmware-latest" prerelease.
#
# This build pulls SlimeVR's firmware (which imports Nordic's sdk-nrf via its
# west.yml) and compiles with the Zephyr SDK toolchain. If SlimeVR bumps their
# sdk-nrf revision and the build breaks, that's expected churn — the build log
# is uploaded on failure to diagnose. The board definition itself
# (firmware/boards/...) is what we maintain here.

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/receiver-firmware.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/receiver-firmware.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  RECEIVER_REPO: https://github.com/SlimeVR/SlimeVR-Tracker-nRF-Receiver
  BOARD: holyiot_yj17120/nrf52840

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (for the board definition)
        uses: actions/checkout@v4
        with:
          path: vyro

      - name: Clone SlimeVR receiver firmware
        run: |
          git clone --depth 1 "$RECEIVER_REPO" receiver
          mkdir -p receiver/boards/holyiot
          cp -r vyro/firmware/boards/holyiot/holyiot_yj17120 receiver/boards/holyiot/
          ls -la receiver/boards/holyiot

      - name: Set up Zephyr / nRF Connect SDK build environment
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: receiver
          manifest-file-name: west.yml
          toolchains: arm-zephyr-eabi

      - name: Build firmware
        working-directory: receiver
        run: |
          west build -b "$BOARD" -p always . 2>&1 | tee build.log

      - name: Collect firmware images
        run: |
          mkdir -p artifacts
          out=receiver/build/zephyr
          found=0
          for ext in uf2 hex bin; do
            if [ -f "$out/zephyr.$ext" ]; then
              cp "$out/zephyr.$ext" "artifacts/holyiot_yj17120.$ext"
              found=1
            fi
          done
          if [ "$found" = "0" ]; then
            echo "No firmware image produced" >&2
            ls -la "$out" || true
            exit 1
          fi
          ls -la artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: receiver-firmware-yj17120
          path: artifacts/*
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: receiver-build-log
          path: receiver/build.log
          if-no-files-found: ignore

      - name: Publish rolling release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: receiver-firmware-latest
          name: Latest receiver firmware (HolyIOT YJ-17120)
          prerelease: true
          files: artifacts/*
          body: |
            Receiver firmware for the HolyIOT YJ-17120 nRF52840 USB dongle,
            built from the latest commit on `main` (`${{ github.sha }}`) with the
            FEM-removed board definition (fixes the ~10 cm range issue).

            Flash `holyiot_yj17120.uf2`: double-tap reset to enter the UF2
            bootloader, then copy the file onto the mounted drive.
