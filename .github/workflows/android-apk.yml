name: Android APK

# Builds an installable (sideloadable) Android/Quest APK so users can download
# it straight from the repo. PRs and manual runs produce a downloadable build
# artifact; pushes to main also publish a rolling "android-latest" prerelease
# with the APK attached for a stable download link.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: .NET info
        run: dotnet --info

      - name: Restore workloads
        run: dotnet workload restore EsbImuReceiverToLanAndroid/EsbImuReceiverToLanAndroid.csproj

      - name: Install Android SDK dependencies
        run: |
          dotnet build EsbImuReceiverToLanAndroid/EsbImuReceiverToLanAndroid.csproj \
            -f net10.0-android \
            -t:InstallAndroidDependencies \
            -p:AndroidSdkPath="${ANDROID_HOME:-$ANDROID_SDK_ROOT}" \
            -p:AcceptAndroidSDKLicenses=True

      - name: Generate ephemeral signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/ci.keystore" \
            -alias ci -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=ESB IMU Receiver CI, O=EsbImuReceiverToLAN, C=US"

      - name: Publish signed APK
        run: |
          dotnet publish EsbImuReceiverToLanAndroid/EsbImuReceiverToLanAndroid.csproj \
            -c Release -f net10.0-android \
            -p:AndroidPackageFormat=apk \
            -p:AndroidLinkMode=None \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/ci.keystore" \
            -p:AndroidSigningStorePass=android \
            -p:AndroidSigningKeyAlias=ci \
            -p:AndroidSigningKeyPass=android \
            -bl:"$RUNNER_TEMP/publish.binlog"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ runner.temp }}/publish.binlog
          if-no-files-found: ignore

      - name: Collect APK
        id: collect
        run: |
          mkdir -p artifacts
          apk=$(find EsbImuReceiverToLanAndroid/bin -name '*-Signed.apk' | head -n1)
          if [ -z "$apk" ]; then
            apk=$(find EsbImuReceiverToLanAndroid/bin -name '*.apk' | head -n1)
          fi
          if [ -z "$apk" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          cp "$apk" "artifacts/EsbImuReceiverToLan.apk"
          echo "Found APK: $apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsbImuReceiverToLan-apk
          path: artifacts/EsbImuReceiverToLan.apk
          if-no-files-found: error

      - name: Publish rolling release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Latest Android/Quest APK
          prerelease: true
          files: artifacts/EsbImuReceiverToLan.apk
          body: |
            Automatically built APK from the latest commit on `main`
            (`${{ github.sha }}`).

            Sideload with `adb install -r EsbImuReceiverToLan.apk` or SideQuest.
            Note: CI uses an ephemeral signing key, so if you already have a
            previous build installed you may need to uninstall it first before
            updating.
